<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>CRAVA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--p:#111;--g:#d7c4a3;--g2:#f1e3ca;--t:#f5efe7;--m:#988f86;--l:rgba(215,196,163,.22);--bad:#ee8f87;--ok:#a9d4b1}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% -10%,rgba(215,196,163,.12),transparent 28%),var(--bg);color:var(--t);font-family:Tajawal}.wrap{width:min(100%,680px);margin:auto;padding:16px 16px 90px}.hidden{display:none!important}.screen{display:none}.screen.active{display:block}.top{display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:20;padding:9px 0;background:linear-gradient(#080808 70%,transparent)}.logo{width:120px}.pill{width:auto;border:1px solid var(--l);background:#111;color:var(--g2);border-radius:999px;padding:9px 12px}.hero{min-height:78vh;display:grid;place-items:center;text-align:center}.hero-logo{width:min(88%,420px)}h1,h2,h3{font-family:"Cormorant Garamond",Tajawal;color:var(--g2)}h1{font-size:39px}.lead{color:var(--m);line-height:1.8;font-size:13px}.card{border:1px solid var(--l);border-radius:23px;background:linear-gradient(145deg,#171514,#0b0b0b);padding:18px;margin:12px 0}.stack{display:grid;gap:11px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}input,textarea,select{width:100%;background:#090909;border:1px solid var(--l);color:white;border-radius:14px;padding:14px}textarea{min-height:80px}.btn{width:100%;border:0;border-radius:15px;padding:15px;font-weight:800}.primary{background:linear-gradient(135deg,var(--g2),#b49a72);color:#17110c}.secondary{background:#111;color:var(--g2);border:1px solid var(--l)}.msg{min-height:18px;color:var(--m);font-size:11px}.bad{color:var(--bad)}.ok{color:var(--ok)}.products{display:grid;gap:12px}.product{border:1px solid var(--l);border-radius:21px;background:#111;overflow:hidden}.product-img{height:175px;background:linear-gradient(145deg,#201c18,#0b0b0b);display:grid;place-items:center;color:var(--g);font:700 34px "Cormorant Garamond"}.product-body{padding:16px}.product h3{font-size:27px;margin:0}.price{font-size:23px;color:var(--g2);direction:ltr;display:inline-block}.qty{display:grid;grid-template-columns:44px 1fr 44px;gap:7px;align-items:center;margin-top:12px}.qty button{height:42px;border-radius:12px;border:1px solid var(--l);background:#111;color:var(--g2)}.cart-row{display:grid;grid-template-columns:1fr auto;gap:9px;border-bottom:1px solid var(--l);padding:11px 0}.summary{display:flex;justify-content:space-between;margin:8px 0}.nav{display:grid;grid-template-columns:1fr 1fr;gap:9px;position:sticky;bottom:10px}.order{border:1px solid var(--l);border-radius:15px;padding:13px;margin:8px 0}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{text-align:center;border:1px solid var(--l);border-radius:14px;padding:11px 4px}.stat b{display:block;color:var(--g2);font-size:20px}@media(max-width:430px){.grid2{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}}
</style></head>
<body><main class="wrap">
<header class="top"><img src="brand-wordmark.png" class="logo"><div><button class="pill" onclick="go('store')">المتجر</button><button class="pill" onclick="openAccount()">حسابي</button></div></header>
<section id="landing" class="screen active"><div class="hero"><div><img src="brand-wordmark.png" class="hero-logo"><h1>كل رغبة تترك توقيعًا.</h1><p class="lead">اطلب بوكس CRAVA، اجمع النقاط، فعّل بوكسك، واصنع ملف ذوقك الخاص.</p><button class="btn primary" onclick="go('store')">ابدأ الطلب</button></div></div></section>
<section id="auth" class="screen"><div class="card stack"><h2>حساب CRAVA</h2><div class="grid2"><button class="btn secondary" onclick="setMode('signup')">حساب جديد</button><button class="btn secondary" onclick="setMode('login')">تسجيل الدخول</button></div><div id="nameWrap"><input id="name" placeholder="الاسم"></div><input id="email" type="email" placeholder="البريد الإلكتروني"><input id="password" type="password" minlength="8" placeholder="كلمة المرور"><button id="authBtn" class="btn primary">إنشاء الحساب</button><button id="forgotBtn" class="btn secondary hidden">نسيت كلمة المرور</button><div id="authMsg" class="msg"></div></div></section>
<section id="store" class="screen"><h2>متجر CRAVA</h2><p class="lead">الدفع عند الاستلام. التوصيل داخل عمّان فقط.</p><div id="products" class="products"></div><div class="nav"><button class="btn secondary" onclick="go('cart')">السلة <span id="cartCount">0</span></button><button class="btn primary" onclick="go('checkout')">إتمام الطلب</button></div></section>
<section id="cart" class="screen"><h2>سلتك</h2><div class="card"><div id="cartRows"></div><div class="summary"><span>المجموع</span><b id="cartTotal">0.000 د.أ</b></div></div><div class="nav"><button class="btn secondary" onclick="go('store')">متابعة</button><button class="btn primary" onclick="go('checkout')">إتمام الطلب</button></div></section>
<section id="checkout" class="screen"><h2>إتمام الطلب</h2><div class="card stack"><p class="lead">الدفع نقدًا عند الاستلام. لا يوجد دفع إلكتروني.</p><input id="checkoutName" placeholder="الاسم الكامل"><input id="checkoutPhone" inputmode="tel" placeholder="07XXXXXXXX أو +9627XXXXXXXX"><input value="عمّان" disabled><input id="area" placeholder="المنطقة داخل عمّان"><input id="street" placeholder="الشارع"><div class="grid2"><input id="building" placeholder="البناية"><input id="floor" placeholder="الطابق"></div><input id="apartment" placeholder="رقم الشقة"><textarea id="deliveryNotes" placeholder="ملاحظات للسائق"></textarea><input id="pointsUse" inputmode="numeric" placeholder="نقاط للاستخدام — اختياري"><div id="checkoutSummary"></div><button id="placeOrder" class="btn primary">تأكيد الطلب</button><div id="checkoutMsg" class="msg"></div></div></section>
<section id="success" class="screen"><div class="hero"><div class="card"><h2>تم استلام طلبك 🎉</h2><p id="successText" class="lead"></p><button class="btn primary" onclick="openAccount()">عرض طلباتي</button></div></div></section>
<section id="account" class="screen"><h2>حسابي</h2><div id="accountContent"></div><div class="grid2"><button class="btn secondary" onclick="go('claim')">تفعيل بوكس</button><button id="logoutBtn" class="btn secondary">تسجيل الخروج</button></div></section>
<section id="claim" class="screen"><h2>فعّل بوكسك</h2><div class="card stack"><input id="boxNo" inputmode="numeric" placeholder="رقم البوكس"><input id="claimCode" placeholder="الكود الخاص داخل البوكس"><button id="claimBtn" class="btn primary">تحقق وأضف للمجموعة</button><div id="claimMsg" class="msg"></div></div></section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./config.js"></script>
<script>
const $=s=>document.querySelector(s),cfg=window.CRAVA_CONFIG||{};let db=window.supabase?.createClient?.(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY)||null;
let user=null,profile=null,mode='signup',products=[],cart={};const money=v=>Number(v||0).toFixed(3)+' د.أ';const esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function go(id){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));$('#'+id).classList.add('active');scrollTo(0,0);if(id==='cart')renderCart();if(id==='checkout')renderCheckout()}
function setMode(v){mode=v;$('#nameWrap').classList.toggle('hidden',v==='login');$('#forgotBtn').classList.toggle('hidden',v!=='login');$('#authBtn').textContent=v==='signup'?'إنشاء الحساب':'تسجيل الدخول'}
async function session(){const{data}=await db.auth.getSession();user=data.session?.user||null;if(user)await loadProfile();return user}async function loadProfile(){const{data}=await db.from('profiles').select('*').eq('id',user.id).single();profile=data}
async function requireUser(){if(await session())return true;setMode('login');go('auth');return false}
async function loadProducts(){const{data,error}=await db.from('products').select('*').eq('is_active',true).order('sort_order');if(error){$('#products').innerHTML='<p class="bad">'+esc(error.message)+'</p>';return}products=data||[];renderProducts()}
function renderProducts(){$('#products').innerHTML=products.map(p=>`<article class="product"><div class="product-img">${p.image_url?`<img src="${esc(p.image_url)}" style="width:100%;height:100%;object-fit:cover">`:'CRAVA'}</div><div class="product-body"><h3>${esc(p.name_ar)}</h3><p class="lead">${esc(p.description_ar||'')}</p><span class="price">${money(p.price)}</span><div class="qty"><button onclick="changeQty('${p.id}',-1)">−</button><b style="text-align:center">${cart[p.id]||0}</b><button onclick="changeQty('${p.id}',1)">+</button></div></div></article>`).join('')||'<p class="lead">لا توجد منتجات.</p>'}
window.changeQty=(id,d)=>{cart[id]=Math.max(0,(cart[id]||0)+d);if(!cart[id])delete cart[id];renderProducts();updateCartCount()}
function updateCartCount(){$('#cartCount').textContent=Object.values(cart).reduce((a,b)=>a+b,0)}function cartItems(){return products.filter(p=>cart[p.id]).map(p=>({...p,quantity:cart[p.id]}))}function cartSum(){return cartItems().reduce((s,p)=>s+Number(p.price)*p.quantity,0)}
function renderCart(){const items=cartItems();$('#cartRows').innerHTML=items.map(p=>`<div class="cart-row"><div><b>${esc(p.name_ar)}</b><div class="lead">${p.quantity} × ${money(p.price)}</div></div><b>${money(Number(p.price)*p.quantity)}</b></div>`).join('')||'<p class="lead">السلة فارغة.</p>';$('#cartTotal').textContent=money(cartSum())}
function renderCheckout(){$('#checkoutSummary').innerHTML=`<div class="summary"><span>المجموع</span><b>${money(cartSum())}</b></div><div class="summary"><span>الدفع</span><b>عند الاستلام</b></div>`;if(profile){$('#checkoutName').value=profile.display_name||'';$('#checkoutPhone').value=profile.phone_e164||''}}
$('#authBtn').onclick=async()=>{const msg=$('#authMsg');msg.textContent='جاري التنفيذ...';try{if(mode==='signup'){const{data,error}=await db.auth.signUp({email:$('#email').value.trim(),password:$('#password').value,options:{data:{display_name:$('#name').value.trim()}}});if(error)throw error;if(!data.session){msg.textContent='افحص بريدك لتأكيد الحساب.';msg.className='msg ok';return}user=data.user}else{const{data,error}=await db.auth.signInWithPassword({email:$('#email').value.trim(),password:$('#password').value});if(error)throw error;user=data.user}await loadProfile();go('store')}catch(e){msg.textContent=e.message;msg.className='msg bad'}}
$('#forgotBtn').onclick=async()=>{const email=$('#email').value.trim();if(!email)return;const{error}=await db.auth.resetPasswordForEmail(email,{redirectTo:new URL('reset-password.html',location.href).href});$('#authMsg').textContent=error?error.message:'تم إرسال رابط الاستعادة.'}
$('#placeOrder').onclick=async()=>{const msg=$('#checkoutMsg');if(!cartItems().length){msg.textContent='السلة فارغة.';msg.className='msg bad';return}if(!(await requireUser()))return;msg.textContent='جاري إنشاء الطلب...';try{const{data,error}=await db.rpc('create_crava_order',{p_customer_name:$('#checkoutName').value.trim(),p_phone:$('#checkoutPhone').value.trim(),p_area:$('#area').value.trim(),p_street:$('#street').value.trim(),p_building:$('#building').value.trim(),p_floor:$('#floor').value.trim(),p_apartment:$('#apartment').value.trim(),p_delivery_notes:$('#deliveryNotes').value.trim(),p_items:cartItems().map(p=>({product_id:p.id,quantity:p.quantity})),p_points_to_use:Number($('#pointsUse').value||0)});if(error)throw error;cart={};updateCartCount();$('#successText').textContent=`رقم طلبك #${String(data.order_number).padStart(6,'0')} — الإجمالي ${money(data.total)}.`;go('success')}catch(e){msg.textContent=e.message;msg.className='msg bad'}}
async function openAccount(){if(!(await requireUser()))return;const[{data:orders},{data:ledger}]=await Promise.all([db.from('orders').select('*').eq('user_id',user.id).order('created_at',{ascending:false}),db.from('points_ledger').select('*').eq('user_id',user.id).order('created_at',{ascending:false}).limit(10)]);$('#accountContent').innerHTML=`<div class="card"><h3>${esc(profile.display_name)}</h3><div class="stats"><div class="stat"><b>${profile.points||0}</b><span>نقطة</span></div><div class="stat"><b>${profile.xp||0}</b><span>XP</span></div><div class="stat"><b>${profile.box_count||0}</b><span>بوكس</span></div></div><p class="lead">كود دعوتك: <b>${esc(profile.referral_code||'—')}</b></p></div><div class="card"><h3>طلباتي</h3>${(orders||[]).map(o=>`<div class="order"><b>#${String(o.order_number).padStart(6,'0')}</b> · ${money(o.total)}<br><span>${esc(o.status)}</span></div>`).join('')||'<p class="lead">لا توجد طلبات.</p>'}</div><div class="card"><h3>سجل النقاط</h3>${(ledger||[]).map(x=>`<div class="cart-row"><span>${esc(x.reason)}</span><b>${x.points>0?'+':''}${x.points}</b></div>`).join('')||'<p class="lead">لا يوجد سجل.</p>'}</div>`;go('account')}
$('#claimBtn').onclick=async()=>{if(!(await requireUser()))return;const{data,error}=await db.rpc('claim_crava_box',{p_box_number:Number($('#boxNo').value),p_claim_code:$('#claimCode').value.trim().toUpperCase()});$('#claimMsg').textContent=error?.message||data?.reason||(data?.ok?'تمت إضافة البوكس.':'تعذر التفعيل');$('#claimMsg').className=(error||!data?.ok)?'msg bad':'msg ok'}
$('#logoutBtn').onclick=async()=>{await db.auth.signOut();user=null;profile=null;go('landing')}session();loadProducts();updateCartCount();
</script></body></html>
