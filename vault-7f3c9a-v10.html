<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CRAVA Control Room V10</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--g:#d7c4a3;--g2:#f1e3ca;--t:#f5efe7;--m:#988f86;--l:rgba(215,196,163,.22);--bad:#ee8f87;--ok:#a9d4b1}
*{box-sizing:border-box}body{margin:0;background:#070707;color:var(--t);font-family:Tajawal}.wrap{width:min(100%,1200px);margin:auto;padding:20px 14px 70px}.logo{width:145px}.hidden{display:none!important}.card{border:1px solid var(--l);border-radius:20px;padding:17px;background:#111;margin:11px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:9px}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:9px}.stat{border:1px solid var(--l);border-radius:15px;padding:13px;background:#0b0b0b}.stat b{display:block;color:var(--g2);font-size:23px}.stat span{font-size:10px;color:var(--m)}input,select,textarea,button{width:100%;padding:12px;border-radius:12px;border:1px solid var(--l);background:#080808;color:white;font:inherit}button{background:linear-gradient(135deg,var(--g2),#b49a72);color:#17110c;font-weight:800}.secondary{background:#171717;color:var(--g2)}h1,h2,h3{color:var(--g2);font-family:"Cormorant Garamond",Tajawal}.tabs{display:flex;gap:7px;overflow:auto}.tabs button{min-width:max-content}.tabs .active{background:linear-gradient(135deg,var(--g2),#b49a72);color:#17110c}.section{display:none}.section.active{display:block}.table{overflow:auto;border:1px solid var(--l);border-radius:14px}table{width:100%;border-collapse:collapse;min-width:900px;font-size:11px}td,th{padding:10px;border-bottom:1px solid var(--l);text-align:right;vertical-align:top}.msg{color:var(--m);font-size:11px}.bad{color:var(--bad)}.ok{color:var(--ok)}.actions{display:flex;gap:6px;min-width:260px}.actions>*{padding:8px}.product{border:1px solid var(--l);border-radius:15px;padding:13px}.top{display:flex;justify-content:space-between;align-items:center}.top button{width:auto}
</style></head><body><div class="wrap"><img src="crava-logo-clean.png" class="logo">
<div id="login" class="card"><h1>الخزنة الخاصة</h1><input id="email" type="email" placeholder="بريد الأدمن"><input id="pass" type="password" placeholder="كلمة المرور" style="margin-top:8px"><button id="loginBtn" style="margin-top:8px">دخول</button><button id="forgotBtn" class="secondary" style="margin-top:8px">نسيت كلمة المرور</button><p id="msg" class="msg"></p></div>
<div id="panel" class="hidden"><div class="top"><h1>غرفة تحكم CRAVA</h1><button id="logout" class="secondary">خروج</button></div>
<div class="tabs"><button data-tab="dashboard" class="active">الرئيسية</button><button data-tab="orders">الطلبات</button><button data-tab="products">المنتجات</button><button data-tab="boxes">البوكسات</button><button data-tab="members">الأعضاء</button></div>
<section id="dashboard" class="section active"><div id="stats" class="stats"></div><div class="card"><h2>آخر الطلبات</h2><div id="latest"></div></div></section>
<section id="orders" class="section"><div class="card grid"><input id="search" placeholder="بحث برقم الطلب أو الاسم أو الهاتف"><select id="filter"><option value="">كل الحالات</option><option value="new">جديد</option><option value="confirmed">مؤكد</option><option value="preparing">قيد التجهيز</option><option value="out_for_delivery">خرج للتوصيل</option><option value="delivered">تم التسليم</option><option value="cancelled">ملغي</option></select><button id="refresh">تحديث</button></div><div class="card" id="ordersTable"></div></section>
<section id="products" class="section"><div class="card"><h2>إضافة أو تعديل منتج</h2><input id="pid" type="hidden"><div class="grid"><input id="pname" placeholder="الاسم بالعربي"><input id="pen" placeholder="الاسم بالإنجليزي"><input id="pslug" placeholder="slug"><input id="pprice" inputmode="decimal" placeholder="السعر"><input id="pimage" placeholder="رابط الصورة"><input id="psort" inputmode="numeric" placeholder="الترتيب"><select id="pactive"><option value="true">ظاهر</option><option value="false">مخفي</option></select></div><textarea id="pdesc" placeholder="الوصف" style="margin-top:8px"></textarea><div class="grid" style="margin-top:8px"><button id="saveProduct">حفظ</button><button id="clearProduct" class="secondary">إلغاء</button></div><p id="pmsg" class="msg"></p></div><div id="productList" class="grid"></div></section>
<section id="boxes" class="section"><div class="card"><h2>تفعيل بوكسات</h2><div class="grid"><input id="from" inputmode="numeric" placeholder="من"><input id="to" inputmode="numeric" placeholder="إلى"><select id="rarity"><option value="standard">Standard</option><option value="golden">Golden</option><option value="rare">Rare</option></select><button id="activate">تفعيل</button></div><p id="actMsg" class="msg"></p></div><div class="card"><h2>بحث عن بوكس</h2><div class="grid"><input id="findNo" inputmode="numeric" placeholder="رقم البوكس"><button id="findBtn">بحث</button></div><pre id="boxResult"></pre></div><div class="card" id="boxesTable"></div></section>
<section id="members" class="section"><div class="card" id="membersTable"></div></section>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./config.js"></script><script>
const $=s=>document.querySelector(s),cfg=window.CRAVA_CONFIG||{},db=supabase.createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY);let orders=[],products=[];
const esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const money=v=>Number(v||0).toFixed(3)+' د.أ';const no=v=>'#'+String(v||0).padStart(6,'0');
document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));document.querySelectorAll('[data-tab]').forEach(x=>x.classList.remove('active'));$('#'+b.dataset.tab).classList.add('active');b.classList.add('active')});
async function verify(){const{data:{session}}=await db.auth.getSession();if(!session)return false;const{data}=await db.rpc('is_current_user_admin');if(data){$('#login').classList.add('hidden');$('#panel').classList.remove('hidden');await loadAll()}return !!data}
$('#loginBtn').onclick=async()=>{const{error}=await db.auth.signInWithPassword({email:$('#email').value.trim(),password:$('#pass').value});if(error){$('#msg').textContent=error.message;return}if(!(await verify())){$('#msg').textContent='تم الرفض';await db.auth.signOut()}}
$('#forgotBtn').onclick=async()=>{const email=$('#email').value.trim();if(!email)return;const{error}=await db.auth.resetPasswordForEmail(email,{redirectTo:new URL('reset-password.html',location.href).href});$('#msg').textContent=error?error.message:'تم إرسال رابط الاستعادة'}
async function loadAll(){await Promise.all([loadStats(),loadOrders(),loadProducts(),loadBoxes(),loadMembers()])}
async function loadStats(){const{data,error}=await db.rpc('admin_store_stats');if(error){$('#stats').innerHTML='<p class="bad">'+esc(error.message)+'</p>';return}const labels={orders_today:'طلبات اليوم',new_orders:'جديدة',active_orders:'قيد التنفيذ',delivered_orders:'مسلّمة',sales_today:'مبيعات اليوم',sales_total:'إجمالي المبيعات',average_order:'متوسط الطلب',active_products:'منتجات ظاهرة'};$('#stats').innerHTML=Object.entries(data||{}).map(([k,v])=>`<div class="stat"><b>${k.includes('sales')||k==='average_order'?money(v):v}</b><span>${labels[k]||k}</span></div>`).join('')}
async function loadOrders(){const{data,error}=await db.from('orders').select('*,order_items(*)').order('created_at',{ascending:false}).limit(300);if(error){$('#ordersTable').innerHTML='<p class="bad">'+esc(error.message)+'</p>';return}orders=data||[];renderOrders();$('#latest').innerHTML=orders.slice(0,6).map(o=>`<div class="product"><b>${no(o.order_number)} — ${esc(o.customer_name)}</b><div class="msg">${esc(o.area)} · ${money(o.total)} · ${esc(o.status)}</div></div>`).join('')||'<p class="msg">لا توجد طلبات.</p>'}
function renderOrders(){const q=$('#search').value.trim().toLowerCase(),f=$('#filter').value;const rows=orders.filter(o=>(!q||[o.order_number,o.customer_name,o.phone_e164,o.area].join(' ').toLowerCase().includes(q))&&(!f||o.status===f));$('#ordersTable').innerHTML=`<div class="table"><table><thead><tr><th>الطلب</th><th>العميل</th><th>العنوان</th><th>المحتويات</th><th>القيمة</th><th>الحالة</th><th>ربط بوكس</th><th>إجراء</th></tr></thead><tbody>${rows.map(o=>`<tr><td>${no(o.order_number)}<br><span class="msg">${new Date(o.created_at).toLocaleString('ar-JO')}</span></td><td>${esc(o.customer_name)}<br>${esc(o.phone_e164)}</td><td>${esc(o.area)}، ${esc(o.street)}<br>${esc(o.building||'')} ${esc(o.floor||'')} ${esc(o.apartment||'')}</td><td>${(o.order_items||[]).map(i=>`${esc(i.product_name)} × ${i.quantity}`).join('<br>')}</td><td>${money(o.total)}</td><td><select id="s-${o.id}">${['new','confirmed','preparing','out_for_delivery','delivered','cancelled'].map(s=>`<option value="${s}" ${o.status===s?'selected':''}>${s}</option>`).join('')}</select></td><td><div class="actions"><input id="b-${o.id}" inputmode="numeric" placeholder="رقم"><select id="r-${o.id}"><option value="standard">Standard</option><option value="golden">Golden</option><option value="rare">Rare</option></select><button onclick="linkBox('${o.id}')">ربط</button></div></td><td><button onclick="saveStatus('${o.id}')">حفظ الحالة</button></td></tr>`).join('')}</tbody></table></div>`}
window.saveStatus=async id=>{const note=prompt('ملاحظة داخلية — اختياري','')??'';const{error}=await db.rpc('admin_update_order_status',{p_order_id:id,p_status:$('#s-'+id).value,p_admin_note:note});if(error)return alert(error.message);await Promise.all([loadOrders(),loadStats()])}
window.linkBox=async id=>{const{data,error}=await db.rpc('admin_link_order_box',{p_order_id:id,p_box_number:Number($('#b-'+id).value),p_rarity:$('#r-'+id).value});if(error)return alert(error.message);alert(`تم ربط الطلب ${no(data.order_number)} بالبوكس #${data.box_number}`);await loadBoxes()}
$('#search').oninput=renderOrders;$('#filter').onchange=renderOrders;$('#refresh').onclick=()=>Promise.all([loadOrders(),loadStats()])
async function loadProducts(){const{data,error}=await db.from('products').select('*').order('sort_order');if(error){$('#productList').innerHTML='<p class="bad">'+esc(error.message)+'</p>';return}products=data||[];$('#productList').innerHTML=products.map(p=>`<div class="product"><h3>${esc(p.name_ar)}</h3><div class="msg">${esc(p.slug)} · ${p.is_active?'ظاهر':'مخفي'}</div><b>${money(p.price)}</b><button class="secondary" onclick="editProduct('${p.id}')">تعديل</button></div>`).join('')}
window.editProduct=id=>{const p=products.find(x=>x.id===id);$('#pid').value=p.id;$('#pname').value=p.name_ar||'';$('#pen').value=p.name_en||'';$('#pslug').value=p.slug||'';$('#pprice').value=p.price;$('#pimage').value=p.image_url||'';$('#psort').value=p.sort_order||0;$('#pactive').value=String(p.is_active);$('#pdesc').value=p.description_ar||''}
function clearP(){['pid','pname','pen','pslug','pprice','pimage','psort','pdesc'].forEach(id=>$('#'+id).value='');$('#pactive').value='true'}$('#clearProduct').onclick=clearP
$('#saveProduct').onclick=async()=>{const{error}=await db.rpc('admin_save_product',{p_id:$('#pid').value||null,p_slug:$('#pslug').value.trim(),p_name_ar:$('#pname').value.trim(),p_name_en:$('#pen').value.trim(),p_description_ar:$('#pdesc').value.trim(),p_price:Number($('#pprice').value),p_image_url:$('#pimage').value.trim(),p_is_active:$('#pactive').value==='true',p_sort_order:Number($('#psort').value||0)});$('#pmsg').textContent=error?error.message:'تم الحفظ';if(!error){clearP();await Promise.all([loadProducts(),loadStats()])}}
async function loadBoxes(){const{data,error}=await db.from('boxes').select('box_number,status,rarity,claimed_at').order('box_number',{ascending:false}).limit(100);if(error)return;$('#boxesTable').innerHTML=`<div class="table"><table><thead><tr><th>البوكس</th><th>الحالة</th><th>الندرة</th><th>Claimed</th></tr></thead><tbody>${(data||[]).map(b=>`<tr><td>#${String(b.box_number).padStart(6,'0')}</td><td>${esc(b.status)}</td><td>${esc(b.rarity)}</td><td>${b.claimed_at?new Date(b.claimed_at).toLocaleString('ar-JO'):'—'}</td></tr>`).join('')}</tbody></table></div>`}
$('#activate').onclick=async()=>{const{data,error}=await db.rpc('admin_activate_box_range',{p_from:Number($('#from').value),p_to:Number($('#to').value),p_rarity:$('#rarity').value});$('#actMsg').textContent=error?.message||`${data.activated} بوكس تم تفعيلها`;if(!error)loadBoxes()}
$('#findBtn').onclick=async()=>{const{data,error}=await db.rpc('admin_get_box',{p_box_number:Number($('#findNo').value)});$('#boxResult').textContent=error?.message||JSON.stringify(data,null,2)}
async function loadMembers(){const{data,error}=await db.from('profiles').select('display_name,phone_e164,points,xp,box_count,referral_code,created_at').order('created_at',{ascending:false}).limit(300);if(error){$('#membersTable').innerHTML='<p class="bad">'+esc(error.message)+'</p>';return}$('#membersTable').innerHTML=`<div class="table"><table><thead><tr><th>الاسم</th><th>الهاتف</th><th>النقاط</th><th>XP</th><th>بوكسات</th><th>كود الدعوة</th></tr></thead><tbody>${(data||[]).map(p=>`<tr><td>${esc(p.display_name)}</td><td>${esc(p.phone_e164||'—')}</td><td>${p.points}</td><td>${p.xp}</td><td>${p.box_count}</td><td>${esc(p.referral_code||'—')}</td></tr>`).join('')}</tbody></table></div>`}
$('#logout').onclick=async()=>{await db.auth.signOut();location.reload()};verify()
</script></body></html>
