<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#080808">
  <meta name="description" content="Reset your CRAVA account password.">
  <title>CRAVA — Reset Password</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#080808;
      --panel:#111;
      --panel2:#171514;
      --gold:#d7c4a3;
      --gold2:#f1e3ca;
      --text:#f5efe7;
      --muted:#988f86;
      --line:rgba(215,196,163,.22);
      --danger:#ee8f87;
      --ok:#a9d4b1;
      --shadow:0 30px 90px rgba(0,0,0,.65);
    }

    *{box-sizing:border-box}

    html,body{min-height:100%}

    body{
      margin:0;
      background:
        radial-gradient(circle at 50% -10%,rgba(215,196,163,.13),transparent 28%),
        var(--bg);
      color:var(--text);
      font-family:Inter,Arial,sans-serif;
    }

    button,input{font:inherit}

    .wrap{
      width:min(100%,560px);
      min-height:100vh;
      margin:auto;
      display:grid;
      align-items:center;
      padding:28px 18px;
    }

    .card{
      border:1px solid var(--line);
      border-radius:30px;
      background:
        radial-gradient(circle at 50% 0,rgba(215,196,163,.08),transparent 30%),
        linear-gradient(145deg,var(--panel2),#0b0b0b 72%);
      padding:28px 22px;
      box-shadow:var(--shadow);
    }

    .logo{
      display:block;
      width:min(58%,220px);
      height:auto;
      margin:0 auto 28px;
      object-fit:contain;
    }

    .eyebrow{
      margin-bottom:9px;
      color:var(--gold);
      font-size:9px;
      letter-spacing:.2em;
      text-transform:uppercase;
      text-align:center;
    }

    h1{
      margin:0;
      color:var(--gold2);
      font:700 42px/1 "Cormorant Garamond",serif;
      text-align:center;
    }

    .lead{
      max-width:400px;
      margin:12px auto 25px;
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
      text-align:center;
    }

    .stack{display:grid;gap:13px}

    label{
      display:block;
      margin-bottom:7px;
      color:var(--gold);
      font-size:10px;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    input{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      outline:none;
      background:#090909;
      color:white;
      padding:15px;
    }

    input:focus{border-color:var(--gold)}

    .btn{
      width:100%;
      border:0;
      border-radius:16px;
      padding:16px 18px;
      font-weight:800;
      cursor:pointer;
    }

    .primary{
      background:linear-gradient(135deg,var(--gold2),#b49a72);
      color:#17110c;
      box-shadow:0 14px 32px rgba(180,154,114,.16);
    }

    .secondary{
      border:1px solid var(--line);
      background:#111;
      color:var(--gold2);
    }

    .btn:disabled{
      cursor:not-allowed;
      opacity:.55;
    }

    .msg{
      min-height:20px;
      color:var(--muted);
      font-size:11px;
      line-height:1.6;
      text-align:center;
    }

    .msg.ok{color:var(--ok)}
    .msg.bad{color:var(--danger)}

    .hidden{display:none!important}

    .security-note{
      margin-top:18px;
      border-top:1px solid rgba(215,196,163,.12);
      padding-top:16px;
      color:var(--muted);
      font-size:10px;
      line-height:1.7;
      text-align:center;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="card">
      <img src="brand-wordmark.png" class="logo" alt="CRAVA">

      <div class="eyebrow">ACCOUNT RECOVERY</div>
      <h1>Create a new password.</h1>
      <p class="lead">
        Enter a secure password for your CRAVA account.
        This recovery link can only be used while it is valid.
      </p>

      <div id="form" class="stack hidden">
        <div>
          <label for="newPassword">New password</label>
          <input
            id="newPassword"
            type="password"
            minlength="8"
            autocomplete="new-password"
            placeholder="Minimum 8 characters">
        </div>

        <div>
          <label for="confirmPassword">Confirm new password</label>
          <input
            id="confirmPassword"
            type="password"
            minlength="8"
            autocomplete="new-password"
            placeholder="Repeat your password">
        </div>

        <button id="updateBtn" class="btn primary" type="button">
          UPDATE PASSWORD
        </button>
      </div>

      <div id="loadingMsg" class="msg">VERIFYING RECOVERY LINK...</div>
      <div id="resultMsg" class="msg"></div>

      <button id="returnBtn" class="btn secondary hidden" type="button">
        RETURN TO ADMIN LOGIN
      </button>

      <div class="security-note">
        CRAVA will never ask you to share your recovery link or password.
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>

  <script>
    const cfg = window.CRAVA_CONFIG || {};
    const form = document.getElementById('form');
    const loadingMsg = document.getElementById('loadingMsg');
    const resultMsg = document.getElementById('resultMsg');
    const returnBtn = document.getElementById('returnBtn');
    const updateBtn = document.getElementById('updateBtn');
    const newPassword = document.getElementById('newPassword');
    const confirmPassword = document.getElementById('confirmPassword');

    const adminPath = cfg.ADMIN_PATH || 'vault-7f3c9a.html';

    function adminUrl(){
      return new URL(adminPath, window.location.href).href;
    }

    function showError(message){
      loadingMsg.classList.add('hidden');
      form.classList.add('hidden');
      resultMsg.textContent = message;
      resultMsg.className = 'msg bad';
      returnBtn.classList.remove('hidden');
    }

    function showForm(){
      loadingMsg.classList.add('hidden');
      resultMsg.textContent = '';
      resultMsg.className = 'msg';
      form.classList.remove('hidden');
      newPassword.focus();
    }

    function recoveryParametersPresent(){
      const hash = window.location.hash || '';
      const query = window.location.search || '';

      return (
        /type=recovery/i.test(hash) ||
        /type=recovery/i.test(query) ||
        /access_token=/i.test(hash) ||
        /code=/i.test(query)
      );
    }

    if (
      !cfg.SUPABASE_URL ||
      !cfg.SUPABASE_ANON_KEY ||
      String(cfg.SUPABASE_URL).includes('PASTE_')
    ){
      showError('CRAVA AUTHENTICATION IS NOT CONFIGURED.');
    } else {
      const db = supabase.createClient(
        cfg.SUPABASE_URL,
        cfg.SUPABASE_ANON_KEY
      );

      let recoveryReady = false;

      db.auth.onAuthStateChange((event, session) => {
        if (event === 'PASSWORD_RECOVERY' && session?.user){
          recoveryReady = true;
          showForm();
        }
      });

      async function initializeRecovery(){
        try{
          const { data, error } = await db.auth.getSession();

          if (error) throw error;

          if (data?.session?.user && recoveryParametersPresent()){
            recoveryReady = true;
            showForm();
            return;
          }

          /*
            Supabase may need a brief moment to process the callback URL and
            emit PASSWORD_RECOVERY.
          */
          setTimeout(() => {
            if (!recoveryReady){
              showError(
                'THIS RECOVERY LINK IS INVALID OR HAS EXPIRED. REQUEST A NEW LINK FROM THE ADMIN LOGIN PAGE.'
              );
            }
          }, 1800);
        } catch (error){
          showError(
            String(error?.message || error || 'RECOVERY LINK COULD NOT BE VERIFIED.').toUpperCase()
          );
        }
      }

      updateBtn.addEventListener('click', async () => {
        const password = newPassword.value;
        const confirm = confirmPassword.value;

        resultMsg.className = 'msg';

        if (!recoveryReady){
          resultMsg.textContent = 'RECOVERY SESSION IS NOT READY.';
          resultMsg.className = 'msg bad';
          return;
        }

        if (password.length < 8){
          resultMsg.textContent = 'PASSWORD MUST BE AT LEAST 8 CHARACTERS.';
          resultMsg.className = 'msg bad';
          return;
        }

        if (password !== confirm){
          resultMsg.textContent = 'PASSWORDS DO NOT MATCH.';
          resultMsg.className = 'msg bad';
          return;
        }

        updateBtn.disabled = true;
        resultMsg.textContent = 'UPDATING PASSWORD...';

        try{
          const { error } = await db.auth.updateUser({ password });

          if (error) throw error;

          resultMsg.textContent =
            'PASSWORD UPDATED SUCCESSFULLY. REDIRECTING TO ADMIN LOGIN...';
          resultMsg.className = 'msg ok';
          form.classList.add('hidden');

          await db.auth.signOut();

          window.history.replaceState(
            {},
            document.title,
            window.location.pathname
          );

          setTimeout(() => {
            window.location.replace(adminUrl());
          }, 1300);
        } catch (error){
          updateBtn.disabled = false;
          resultMsg.textContent =
            String(error?.message || error || 'PASSWORD UPDATE FAILED.').toUpperCase();
          resultMsg.className = 'msg bad';
        }
      });

      confirmPassword.addEventListener('keydown', event => {
        if (event.key === 'Enter') updateBtn.click();
      });

      initializeRecovery();
    }

    returnBtn.addEventListener('click', () => {
      window.location.href = adminUrl();
    });
  </script>
</body>
</html>
