<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CRAVA Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>:root{--g:#d7c4a3;--t:#f5efe7;--m:#988f86;--l:rgba(215,196,163,.22)}*{box-sizing:border-box}body{margin:0;background:#070707;color:var(--t);font-family:Inter}.wrap{width:min(100%,900px);margin:auto;padding:24px}.logo{width:130px}.card{border:1px solid var(--l);border-radius:20px;padding:20px;background:#111;margin:12px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}input,select,button{width:100%;padding:13px;border-radius:12px;border:1px solid var(--l);background:#080808;color:white}button{background:linear-gradient(135deg,#f1e3ca,#b49a72);color:#17110c;font-weight:800;cursor:pointer}h1,h2{font-family:"Cormorant Garamond";color:var(--g)}.stat{border:1px solid var(--l);padding:15px;border-radius:15px}.stat b{font-size:25px;color:var(--g)}.msg{color:var(--m);font-size:12px}.danger{color:#ee8f87}.hidden{display:none}.table{overflow:auto}table{width:100%;border-collapse:collapse;font-size:12px}td,th{padding:10px;border-bottom:1px solid var(--l);text-align:left}</style></head>
<body><div class="wrap"><img src="crava-logo-clean.png" class="logo"><div id="login" class="card"><h1>Private Vault</h1><p class="msg">This page is not linked publicly. Server-side admin authorization is still required.</p><input id="email" type="email" placeholder="Admin email" style="margin-bottom:8px"><input id="pass" type="password" placeholder="Password" style="margin-bottom:8px"><button id="loginBtn">ENTER VAULT</button><button id="forgotBtn" type="button" style="margin-top:8px;background:#171717;color:var(--g)">FORGOT PASSWORD?</button><p id="msg" class="msg"></p></div>
<div id="panel" class="hidden"><h1>CRAVA Control Room</h1><div id="stats" class="grid"></div>
<div class="card"><h2>Activate box range</h2><div class="grid"><input id="from" inputmode="numeric" placeholder="From: 1"><input id="to" inputmode="numeric" placeholder="To: 20"><select id="rarity"><option value="standard">Standard</option><option value="golden">Golden</option><option value="rare">Rare</option></select><button id="activate">ACTIVATE RANGE</button></div><p id="actMsg" class="msg"></p></div>
<div class="card"><h2>Find a box</h2><div class="grid"><input id="findNo" inputmode="numeric" placeholder="Box number"><button id="findBtn">SEARCH</button></div><div id="boxResult"></div></div>
<div class="card"><h2>Recent activity</h2><div class="table"><table><thead><tr><th>Box</th><th>Status</th><th>Rarity</th><th>Claimed</th></tr></thead><tbody id="rows"></tbody></table></div></div>
<button id="logout">SIGN OUT</button></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./config.js"></script><script>
const $=s=>document.querySelector(s),cfg=window.CRAVA_CONFIG,db=supabase.createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY);
async function verify(){const{data:{session}}=await db.auth.getSession();if(!session)return false;const{data}=await db.rpc('is_current_user_admin');if(data){$('#login').classList.add('hidden');$('#panel').classList.remove('hidden');load()}return !!data}
$('#loginBtn').onclick=async()=>{const{error}=await db.auth.signInWithPassword({email:$('#email').value.trim(),password:$('#pass').value});if(error){$('#msg').textContent=error.message;$('#msg').className='msg danger';return}if(!(await verify())){await db.auth.signOut();$('#msg').textContent='ACCESS DENIED';$('#msg').className='msg danger'}};
$('#forgotBtn').onclick=async()=>{
  const email=$('#email').value.trim();
  if(!email){
    $('#msg').textContent='ENTER YOUR ADMIN EMAIL FIRST';
    $('#msg').className='msg danger';
    return;
  }

  $('#msg').textContent='SENDING RESET LINK...';
  $('#msg').className='msg';

  const redirectTo=new URL('reset-password.html',window.location.href).href;
  const{error}=await db.auth.resetPasswordForEmail(email,{redirectTo});

  if(error){
    $('#msg').textContent=error.message;
    $('#msg').className='msg danger';
  }else{
    $('#msg').textContent='RESET LINK SENT — CHECK YOUR EMAIL';
    $('#msg').className='msg';
  }
};
async function load(){const[{data:s},{data:r}]=await Promise.all([db.rpc('admin_dashboard_stats'),db.from('boxes').select('box_number,status,rarity,claimed_at').order('box_number',{ascending:false}).limit(30)]);$('#stats').innerHTML=Object.entries(s||{}).map(([k,v])=>`<div class="stat"><b>${v}</b><div class="msg">${k.replaceAll('_',' ').toUpperCase()}</div></div>`).join('');$('#rows').innerHTML=(r||[]).map(x=>`<tr><td>#${String(x.box_number).padStart(6,'0')}</td><td>${x.status}</td><td>${x.rarity}</td><td>${x.claimed_at?new Date(x.claimed_at).toLocaleString():'—'}</td></tr>`).join('')}
$('#activate').onclick=async()=>{const{data,error}=await db.rpc('admin_activate_box_range',{p_from:+$('#from').value,p_to:+$('#to').value,p_rarity:$('#rarity').value});$('#actMsg').textContent=error?.message||`${data.activated} BOXES ACTIVATED`;if(!error)load()};
$('#findBtn').onclick=async()=>{const{data,error}=await db.rpc('admin_get_box',{p_box_number:+$('#findNo').value});$('#boxResult').innerHTML=error?`<p class="danger">${error.message}</p>`:`<pre>${JSON.stringify(data,null,2)}</pre>`};
$('#logout').onclick=async()=>{await db.auth.signOut();location.reload()};verify();
</script></body></html>
